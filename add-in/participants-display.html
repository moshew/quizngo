<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahoot Participants</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            direction: rtl;
        }

        .participants-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .game-pin {
            background: white;
            color: #333;
            padding: 20px 40px;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .pin-label {
            font-size: 18px;
            margin-bottom: 5px;
            color: #666;
        }

        .pin-number {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            letter-spacing: 3px;
        }

        .kahoot-logo {
            font-size: 36px;
            font-weight: bold;
            color: white;
            margin-bottom: 20px;
        }

        .participants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .participant-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .participant-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            background: rgba(255, 255, 255, 0.25);
        }

        .participant-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .participant-name {
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .waiting-message {
            text-align: center;
            font-size: 24px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 40px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* Different avatar colors for variety */
        .participant-card:nth-child(1) .participant-avatar { background: linear-gradient(45deg, #FF6B6B, #FF8E53); }
        .participant-card:nth-child(2) .participant-avatar { background: linear-gradient(45deg, #4ECDC4, #44A08D); }
        .participant-card:nth-child(3) .participant-avatar { background: linear-gradient(45deg, #9B59B6, #8E44AD); }
        .participant-card:nth-child(4) .participant-avatar { background: linear-gradient(45deg, #3498DB, #2980B9); }
        .participant-card:nth-child(5) .participant-avatar { background: linear-gradient(45deg, #F39C12, #E67E22); }
        .participant-card:nth-child(6) .participant-avatar { background: linear-gradient(45deg, #E74C3C, #C0392B); }
        .participant-card:nth-child(7) .participant-avatar { background: linear-gradient(45deg, #1ABC9C, #16A085); }
    </style>
</head>
<body>
    <div class="participants-container">
        <div class="header">
            <div class="kahoot-logo">Kahoot!</div>
            <div class="game-pin">
                <div class="pin-label">Game PIN:</div>
                <div class="pin-number">528 8478</div>
            </div>
        </div>

        <div class="participants-grid">
            <div class="participant-card">
                <div class="participant-avatar">J</div>
                <div class="participant-name">Joe</div>
            </div>
            
            <div class="participant-card">
                <div class="participant-avatar">T</div>
                <div class="participant-name">Ttt</div>
            </div>
            
            <div class="participant-card">
                <div class="participant-avatar">M</div>
                <div class="participant-name">moshe</div>
            </div>
            
            <div class="participant-card">
                <div class="participant-avatar">S</div>
                <div class="participant-name">Sarah</div>
            </div>
            
            <div class="participant-card">
                <div class="participant-avatar">D</div>
                <div class="participant-name">David</div>
            </div>
            
            <div class="participant-card">
                <div class="participant-avatar">L</div>
                <div class="participant-name">Lisa</div>
            </div>
            
            <div class="participant-card">
                <div class="participant-avatar">A</div>
                <div class="participant-name">Alex</div>
            </div>
        </div>

        <div class="waiting-message">
            מחכים למשתתפים נוספים...
        </div>
    </div>
</body>
</html>
