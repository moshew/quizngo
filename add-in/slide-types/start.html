<!-- Start Game Screen with QR Code -->
<style>
    .start-container {
        text-align: center;
        padding: 20px;
    }
    
    .game-title {
        font-size: 24px;
        font-weight: bold;
        color: #333;
        margin-bottom: 20px;
    }
    
    .qr-section {
        background: white;
        border: 2px solid #0078d4;
        border-radius: 8px;
        padding: 20px;
        margin: 20px 0;
    }
    
    .qr-code-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 20px 0;
        min-height: 200px;
    }
    
    #qrcode, #qrCanvas {
        display: inline-block;
        border: 2px solid #0078d4;
        border-radius: 8px;
        background: white;
    }
    
    .url-display {
        background-color: #f3f2f1;
        padding: 12px;
        border-radius: 4px;
        margin: 15px 0;
        font-family: monospace;
        font-size: 14px;
        word-break: break-all;
        color: #0078d4;
    }
    
    .instructions {
        font-size: 16px;
        color: #605e5c;
        margin: 15px 0;
        line-height: 1.6;
    }
    
    .loading {
        color: #666;
        font-style: italic;
    }
</style>

<div class="start-container">
    <div class="game-title">🎮 התחל משחק</div>
    
    <div class="qr-section">
        <h3 style="margin: 0 0 15px 0; color: #0078d4;">סרוק קוד QR לכניסה למשחק</h3>
        
        <div class="qr-code-container" id="qrCodeArea">
            <div class="loading">טוען קוד QR...</div>
        </div>
        
        <div class="instructions">
            סרוק את הקוד עם מכשיר נייד או היכנס לכתובת:
        </div>
        
        <div class="url-display" id="adminUrl">
            טוען כתובת...
        </div>
    </div>
    
    <div style="margin-top: 20px; font-size: 12px; color: #999;">
        💡 המשתתפים יכולים להיכנס דרך הקוד או הכתובת
    </div>
</div>

<!-- Note: QR code initialization logic handled by taskpane.js (initializeStartScreen function) -->
<!-- Scripts in innerHTML don't execute, so logic is centralized in main JS -->
