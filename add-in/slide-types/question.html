<!-- תשובה נכונה -->
<div class="status-section">
    <div style="margin: 20px 0;">
        <label for="correctAnswer" style="display: block; font-size: 16px; font-weight: 600; color: #495057; margin-bottom: 10px;">
            ✅ תשובה נכונה:
        </label>
        <select id="correctAnswer" style="width: 100%; padding: 12px; font-size: 16px; border: 2px solid #dee2e6; border-radius: 8px; background-color: white; cursor: pointer; transition: border-color 0.3s;">
            <option value="1">🔴 תשובה 1</option>
            <option value="2">🔵 תשובה 2</option>
            <option value="3">🟡 תשובה 3</option>
            <option value="4">🟢 תשובה 4</option>
        </select>
    </div>
</div>

<!-- כפתורי הוספת אלמנטים דינמיים לשקף -->
<div class="status-section">
    <div style="margin: 20px 0;">
        <label style="display: block; font-size: 16px; font-weight: 600; color: #495057; margin-bottom: 10px;">
            🎯 הוסף לשקף:
        </label>
        <div style="display: flex; gap: 10px; flex-direction: column;">
            <button class="button" onclick="addQuestionTime()" style="padding: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: transform 0.2s;">
                ⏱️ זמן שאלה
            </button>
            <button class="button" onclick="addRespondentsCount()" style="padding: 10px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: transform 0.2s;">
                👥 מספר עונים
            </button>
        </div>
    </div>
</div>

<!-- Note: Event listener logic handled by taskpane.js (attachQuestionAnswerListener function) -->
<!-- Scripts in innerHTML don't execute, so logic is centralized in main JS -->
