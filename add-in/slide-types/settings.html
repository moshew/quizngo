<!-- הגדרות -->
<div style="padding: 20px; max-width: 500px; margin: 0 auto;">
    
    <!-- כותרת -->
    <div style="margin-bottom: 35px; padding-bottom: 20px; border-bottom: 1px solid #e0e0e0;">
        <h2 style="margin: 0 0 8px 0; color: #333; font-size: 22px; font-weight: 600;">הגדרות משחק</h2>
        <p style="margin: 0; color: #666; font-size: 13px; line-height: 1.4;">התאמה אישית של התזמון והמעברים</p>
    </div>
    
    <!-- קבוצת הגדרות: זמנים -->
    <div style="margin-bottom: 30px;">
        <h3 style="margin: 0 0 16px 0; color: #444; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">תזמון</h3>
        
        <!-- זמן המתנה למענה -->
        <div style="margin-bottom: 20px;">
            <label for="questionWaitTime" style="display: block; margin-bottom: 8px; color: #555; font-size: 14px; font-weight: 500;">
                זמן המתנה למענה על שאלה
            </label>
            <div style="display: flex; align-items: center; gap: 12px;">
                <input 
                    type="number" 
                    id="questionWaitTime" 
                    min="5" 
                    max="300" 
                    value="30"
                    style="flex: 1; padding: 10px 14px; font-size: 15px; border: 1.5px solid #d0d0d0; border-radius: 6px; background: #fafafa; transition: all 0.2s;"
                    onfocus="this.style.borderColor='#0078d4'; this.style.background='white';"
                    onblur="this.style.borderColor='#d0d0d0'; this.style.background='#fafafa';"
                />
                <span style="color: #666; font-size: 14px; min-width: 45px;">שניות</span>
            </div>
        </div>
        
        <!-- זמן הפעלת שעון -->
        <div style="margin-bottom: 20px;">
            <label for="clockActivationDelay" style="display: block; margin-bottom: 8px; color: #555; font-size: 14px; font-weight: 500;">
                השהיית הפעלת שעון
            </label>
            <div style="display: flex; align-items: center; gap: 12px;">
                <input 
                    type="number" 
                    id="clockActivationDelay" 
                    min="0" 
                    max="60" 
                    value="5"
                    style="flex: 1; padding: 10px 14px; font-size: 15px; border: 1.5px solid #d0d0d0; border-radius: 6px; background: #fafafa; transition: all 0.2s;"
                    onfocus="this.style.borderColor='#0078d4'; this.style.background='white';"
                    onblur="this.style.borderColor='#d0d0d0'; this.style.background='#fafafa';"
                />
                <span style="color: #666; font-size: 14px; min-width: 45px;">שניות</span>
            </div>
        </div>
    </div>
    
    <!-- קבוצת הגדרות: מעברים -->
    <div style="margin-bottom: 30px;">
        <h3 style="margin: 0 0 16px 0; color: #444; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">מעברים אוטומטיים</h3>
        
        <div style="background: #f8f8f8; border: 1px solid #e0e0e0; border-radius: 6px; padding: 16px;">
            <div style="margin-bottom: 10px; color: #555; font-size: 13px; font-weight: 500;">לאחר שקף שאלה:</div>
            
            <label style="display: flex; align-items: center; padding: 10px; cursor: pointer; border-radius: 4px; transition: background 0.2s;"
                   onmouseover="this.style.background='#eeeeee';"
                   onmouseout="this.style.background='transparent';">
                <input 
                    type="checkbox" 
                    id="afterQuestionStatistics"
                    checked
                    style="margin-left: 10px; width: 18px; height: 18px; cursor: pointer;"
                />
                <span style="color: #444; font-size: 14px;">עבור לשקף סטטיסטיקה</span>
            </label>
            
            <label style="display: flex; align-items: center; padding: 10px; cursor: pointer; border-radius: 4px; transition: background 0.2s;"
                   onmouseover="this.style.background='#eeeeee';"
                   onmouseout="this.style.background='transparent';">
                <input 
                    type="checkbox" 
                    id="afterQuestionLeaderboard"
                    style="margin-left: 10px; width: 18px; height: 18px; cursor: pointer;"
                />
                <span style="color: #444; font-size: 14px;">עבור לשקף מובילים</span>
            </label>
        </div>
    </div>
    
    <!-- כפתור חזרה -->
    <div style="padding-top: 20px; border-top: 1px solid #e0e0e0;">
        <button 
            onclick="closeSettings()" 
            style="width: 100%; padding: 12px; font-size: 15px; font-weight: 500; color: #333; background: white; border: 1.5px solid #d0d0d0; border-radius: 6px; cursor: pointer; transition: all 0.2s;"
            onmouseover="this.style.borderColor='#0078d4'; this.style.color='#0078d4';"
            onmouseout="this.style.borderColor='#d0d0d0'; this.style.color='#333';"
        >
            חזור
        </button>
    </div>
    
</div>

<script>
(function() {
    console.log('⚙️ settings.html script starting...');
    
    // Load saved settings
    function loadSettings() {
        if (!window.presentationSettings) {
            // Initialize with defaults
            window.presentationSettings = {
                questionWaitTime: 30,
                clockActivationDelay: 5,
                afterQuestionStatistics: true,
                afterQuestionLeaderboard: false
            };
            console.log('📋 Initialized default settings');
        }
        
        // Apply to UI
        const questionWaitTime = document.getElementById('questionWaitTime');
        const clockActivationDelay = document.getElementById('clockActivationDelay');
        const afterQuestionStatistics = document.getElementById('afterQuestionStatistics');
        const afterQuestionLeaderboard = document.getElementById('afterQuestionLeaderboard');
        
        if (questionWaitTime) {
            questionWaitTime.value = window.presentationSettings.questionWaitTime || 30;
        }
        
        if (clockActivationDelay) {
            clockActivationDelay.value = window.presentationSettings.clockActivationDelay || 5;
        }
        
        if (afterQuestionStatistics) {
            afterQuestionStatistics.checked = window.presentationSettings.afterQuestionStatistics !== false;
        }
        
        if (afterQuestionLeaderboard) {
            afterQuestionLeaderboard.checked = window.presentationSettings.afterQuestionLeaderboard === true;
        }
        
        console.log('✅ Settings loaded:', window.presentationSettings);
    }
    
    // Save settings when changed
    function saveSettings() {
        const questionWaitTime = document.getElementById('questionWaitTime');
        const clockActivationDelay = document.getElementById('clockActivationDelay');
        const afterQuestionStatistics = document.getElementById('afterQuestionStatistics');
        const afterQuestionLeaderboard = document.getElementById('afterQuestionLeaderboard');
        
        window.presentationSettings = {
            questionWaitTime: parseInt(questionWaitTime.value) || 30,
            clockActivationDelay: parseInt(clockActivationDelay.value) || 5,
            afterQuestionStatistics: afterQuestionStatistics.checked,
            afterQuestionLeaderboard: afterQuestionLeaderboard.checked
        };
        
        console.log('💾 Settings saved:', window.presentationSettings);
        
        // Trigger auto-save
        if (typeof window.markUnsavedChanges === 'function') {
            window.markUnsavedChanges();
        }
    }
    
    // Add event listeners
    const questionWaitTime = document.getElementById('questionWaitTime');
    const clockActivationDelay = document.getElementById('clockActivationDelay');
    const afterQuestionStatistics = document.getElementById('afterQuestionStatistics');
    const afterQuestionLeaderboard = document.getElementById('afterQuestionLeaderboard');
    
    if (questionWaitTime) {
        questionWaitTime.addEventListener('change', saveSettings);
        questionWaitTime.addEventListener('input', saveSettings);
    }
    
    if (clockActivationDelay) {
        clockActivationDelay.addEventListener('change', saveSettings);
        clockActivationDelay.addEventListener('input', saveSettings);
    }
    
    if (afterQuestionStatistics) {
        afterQuestionStatistics.addEventListener('change', saveSettings);
    }
    
    if (afterQuestionLeaderboard) {
        afterQuestionLeaderboard.addEventListener('change', saveSettings);
    }
    
    // Load settings on init
    loadSettings();
})();
</script>
