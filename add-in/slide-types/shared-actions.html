<!-- פעולות משותפות לכל סוגי השקפים - בתחתית קבועה -->

<!-- Auto-save status indicator - קומפקטי -->
<div id="autoSaveStatus" style="font-size: 10px; color: #28a745; text-align: center; padding: 4px; margin-bottom: 6px; display: none; background: rgba(40, 167, 69, 0.1); border-radius: 3px;">
    ✅ שמירה אוטומטית
</div>

<!-- כפתורים בשורה אחת - קומפקטיים -->
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
    <button class="button" onclick="startPresentationMode()" style="width: 100%; background-color: #e74c3c; font-size: 13px; padding: 10px 12px;">
        ▶️ משחק
    </button>
    <button class="button" onclick="openSettings()" style="width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-size: 13px; padding: 10px 12px;">
        ⚙️ הגדרות
    </button>
</div>
