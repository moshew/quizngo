<!-- תוכן ספציפי לסיכום -->
<div class="status-section">
    <div style="margin: 10px 0; text-align: center;">
        <div style="font-size: 14px; color: #605e5c; margin-bottom: 5px;">מזהה משחק:</div>
        <div id="gameId" style="font-size: 24px; font-weight: bold; color: #0078d4;">-</div>
    </div>
    
    <div class="stats-grid">
        <div class="stat-item">
            <div class="stat-value" id="userCount">-</div>
            <div class="stat-label">משתתפים</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="timeRemaining">-</div>
            <div class="stat-label">זמן נותר</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="currentSlide">-</div>
            <div class="stat-label">שקופית נוכחית</div>
        </div>
    </div>
    
    <!-- כפתורים ספציפיים לסיכום -->
    <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #dee2e6;">
        <h4 style="margin: 0 0 10px 0; color: #495057;">סיכום המשחק:</h4>
        <div style="display: grid; grid-template-columns: 1fr; gap: 10px;">
            <button class="button" onclick="showFinalResults()" style="background-color: #9b59b6;">
                🎯 הצג תוצאות סופיות
            </button>
            <button class="button" onclick="insertFinalLeaderboard()">
                🏅 הכנס טבלת מובילים סופית
            </button>
            <button class="button" onclick="endGame()" style="background-color: #e74c3c;">
                🔚 סיים משחק
            </button>
        </div>
    </div>
</div>
