<!-- תוכן ספציפי לשקף מעבר (תוכן דיפולטי) -->
<div class="status-section">
    <div style="margin: 10px 0; text-align: center;">
        <div style="font-size: 14px; color: #605e5c; margin-bottom: 5px;">מזהה משחק:</div>
        <div id="gameId" style="font-size: 24px; font-weight: bold; color: #0078d4;">-</div>
    </div>
    
    <div class="stats-grid">
        <div class="stat-item">
            <div class="stat-value" id="userCount">-</div>
            <div class="stat-label">משתתפים</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="timeRemaining">-</div>
            <div class="stat-label">זמן נותר</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="currentSlide">-</div>
            <div class="stat-label">שקופית נוכחית</div>
        </div>
    </div>
</div>
