<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kahoot Quiz Manager</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    
    <!-- Socket.IO for WebSocket support -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <!-- For Fabric UI -->
    <link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/9.6.1/css/fabric.min.css"/>
    
    <style>
        body {
            font-family: "Segoe UI", "Segoe UI Web (West European)", "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue", sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            direction: rtl;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
        }
        
        /* Header קבוע - סוג השקף */
        .header-section {
            flex-shrink: 0;
            padding: 20px 20px 0px 20px;
            background: white;
            border-bottom: 1px solid #edebe9;
            z-index: 20;
        }
        
        /* Content גולל - החלק האמצעי בלבד */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 15px 20px;
        }
        
        /* Footer קבוע - פעולות משותפות */
        .footer-section {
            flex-shrink: 0;
            background: white;
            border-top: 2px solid #dee2e6;
            padding: 10px 20px;
            z-index: 20;
        }
        
        #slideContentArea {
            display: flex;
            flex-direction: column;
        }
        
        .status-section {
            background-color: #f3f2f1;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .control-section {
            margin-bottom: 20px;
        }
        
        .button {
            background-color: #0078d4;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            min-width: 120px;
        }
        
        .button:hover {
            background-color: #106ebe;
        }
        
        .button:disabled {
            background-color: #a19f9d;
            cursor: not-allowed;
        }
        
        
        .info-box {
            background-color: #deecf9;
            border: 1px solid #0078d4;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .warning-box {
            background-color: #fff4ce;
            border: 1px solid #ffb900;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        
        .stat-item {
            text-align: center;
            padding: 10px;
            background-color: white;
            border: 1px solid #edebe9;
            border-radius: 4px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #0078d4;
        }
        
        .stat-label {
            font-size: 12px;
            color: #605e5c;
        }
        
        .participant-item {
            background: linear-gradient(135deg, #0078d4, #106ebe);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,120,212,0.3);
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease-out;
        }
        
        .participant-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,120,212,0.4);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(-10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        @keyframes slideOut {
            from {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
            to {
                opacity: 0;
                transform: scale(0.8) translateY(-10px);
            }
        }
        
        .participant-item.removing {
            animation: slideOut 0.3s ease-in forwards;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header קבוע - סוג השקף -->
        <div class="header-section">
            <!-- Slide Type Selection Section -->
            <div class="control-section" id="slideTypeControl">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 0;">
                    <span style="font-weight: bold; min-width: 80px;">סוג שקף:</span>
                    <select id="slideType" style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; direction: rtl;">
                        <option value="opening">פתיחה</option>
                        <option value="transition">מעבר</option>
                        <option value="question">שאלה</option>
                        <option value="statistics">סטטיסטיקת מענה</option>
                        <option value="leaderboard">מובילים</option>
                        <option value="summary">סיכום</option>
                    </select>
                </div>
                
                <!-- Status Info Section -->
                <div>
                    <div id="detectedInfo" style="font-size: 12px; color: #0078d4; padding: 8px; background: #f0f8ff; border-radius: 3px; display: none; margin-top: 8px;"></div>
                </div>
            </div>
        </div>
        
        <!-- Content גולל - רק החלק האמצעי -->
        <div class="scrollable-content">
            <!-- Dynamic content area - loads different HTML based on slide type -->
            <div id="slideContentArea">
                <!-- Content will be loaded dynamically based on slide type -->
                <div style="text-align: center; padding: 40px 20px; color: #6c757d;">
                    <div style="font-size: 48px; margin-bottom: 15px;">⏳</div>
                    <p>טוען ממשק...</p>
                </div>
            </div>
            
            <div id="errorMessage" class="warning-box" style="display: none;"></div>
            
            <!-- Dynamic Participants Display Area (only visible for פתיחה slides) -->
            <div id="dynamicParticipantsArea" style="display: none; margin-top: 20px;">
                <div style="background-color: #f3f2f1; padding: 15px; border-radius: 4px; border: 2px solid #0078d4;">
                    <h4 style="margin: 0 0 15px 0; text-align: center; color: #0078d4;">משתתפים פעילים</h4>
                    <div id="participantsContainer" data-kahoot-participants-area="true" style="min-height: 100px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; align-items: flex-start;">
                        <div id="noParticipants" style="color: #666; font-style: italic; width: 100%; text-align: center; padding: 20px;">
                            מחכים למשתתפים...
                        </div>
                    </div>
                    <div style="text-align: center; margin-top: 10px; font-size: 12px; color: #666;">
                        סה"כ משתתפים: <span id="totalParticipantsCount">0</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Footer קבוע - פעולות משותפות (ייטען דינמית מ-shared-actions.html) -->
        <div class="footer-section" id="sharedActionsContainer">
            <!-- Will be populated by shared-actions.html -->
        </div>
    </div>

    <script type="text/javascript" src="taskpane.js"></script>
</body>
</html>
