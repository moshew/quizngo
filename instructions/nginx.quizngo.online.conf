map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $arg_srv_id $quiz_backend {
    default  127.0.0.1:5001;
    srv-01   127.0.0.1:5001;
    srv-02   127.0.0.1:5002;
}

# Redirect all configured hosts to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name quizngo.online www.quizngo.online addin.quizngo.online admin.quizngo.online game.quizngo.online sim.quizngo.online dashboard.quizngo.online srv.quizngo.online srv-01.quizngo.online srv-02.quizngo.online;
    return 301 https://$host$request_uri;
}

# Main website host (UI paths)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name quizngo.online www.quizngo.online;

    # Set certificate that includes all domains above.
    ssl_certificate     /etc/letsencrypt/live/quizngo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quizngo.online/privkey.pem;

    client_max_body_size 20m;

    # Compatibility route (optional): old same-origin LB path
    location = /lb {
        return 301 /lb/;
    }

    location /lb/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location = /game {
        return 301 /game/;
    }

    location /game/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location = /dashboard {
        return 301 /dashboard/;
    }

    location /dashboard/ {
        proxy_pass http://127.0.0.1:5010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location = /addin {
        return 301 /addin/;
    }

    location /addin/ {
        proxy_pass http://127.0.0.1:3300/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
    }

    location / {
        return 404;
    }
}

# Central LB entry point
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name srv.quizngo.online;

    ssl_certificate     /etc/letsencrypt/live/quizngo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quizngo.online/privkey.pem;

    # LB endpoints (resolve, registration, admin, health)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Game server traffic — routed by ?srv_id=
    location / {
        proxy_pass http://$quiz_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}

